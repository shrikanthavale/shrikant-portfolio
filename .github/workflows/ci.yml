name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  commit-message:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FROM_SHA="${{ github.event.pull_request.base.sha }}"
          else
            FROM_SHA="${{ github.event.before }}"
          fi

          if [ "$FROM_SHA" = "0000000000000000000000000000000000000000" ]; then
            FROM_SHA=$(git rev-list --max-parents=0 HEAD)
          fi

          npx commitlint --from "$FROM_SHA" --to "${{ github.sha }}" --verbose

  quality:
    needs: commit-message
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
