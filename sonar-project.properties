# Project identification
sonar.projectKey=shrikanthavale_shrikant-portfolio
sonar.organization=shrikanthavale

# Source configuration
sonar.sources=app
sonar.sourceEncoding=UTF-8
sonar.language=ts
sonar.typescript.tsconfigPath=tsconfig.json

# Exclusions
sonar.exclusions=**/*.test.ts,**/*.spec.ts,node_modules/**,.next/**,public/**,**/*.config.ts,**/*.config.mjs

# Test configuration
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions — UI-only files that are not unit-tested
sonar.coverage.exclusions=app/components/**,app/**/page.tsx,app/**/layout.tsx,app/apple-icon.tsx

# Duplication exclusions — component files have intentional structural similarity
sonar.cpd.exclusions=app/components/**