sonar.projectKey=shrikanthavale_shrikant-portfolio
# Unique identifier for your project on SonarCloud
# Must match exactly what SonarCloud generated for you

sonar.organization=shrikanthavale
# Your SonarCloud organization (usually your GitHub username)

sonar.sources=app
# Tell Sonar to only scan the app/ directory
# Without this it scans everything including node_modules, .next, config files

sonar.exclusions=**/*.test.ts,**/*.spec.ts,node_modules/**,.next/**
# Explicitly exclude generated/dependency folders
# .next contains compiled output — you don't want that scanned

sonar.typescript.tsconfigPath=tsconfig.json
# Points Sonar to your TypeScript config
# Helps it understand your path aliases like @/* and module resolution

